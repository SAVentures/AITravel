<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Travel — Day-of access · boarding pass</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Schibsted+Grotesk:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../foundations/foundations.css" />
<link rel="stylesheet" href="wallet-shell.css" />
<style>
  /* white status icons over the dark takeover */
  .acc-screen .statusbar, .acc-screen .statusbar .sb-icons svg { color: var(--paper-0); }
  .acc-screen .home-bar { background: var(--paper-0); }
</style>
</head>
<body>
<div class="frame">
  <div class="screen">
    <div class="acc-screen">
      <div class="island"></div>
      <div class="statusbar">
        <span>9:41</span>
        <span class="sb-icons">
          <svg width="18" height="12" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx=".7" fill="currentColor"/><rect x="4.8" y="5" width="3.2" height="7" rx=".7" fill="currentColor"/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx=".7" fill="currentColor"/><rect x="14.4" y="0" width="3.2" height="12" rx=".7" fill="currentColor"/></svg>
          <svg width="16" height="12" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill="currentColor"/><path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill="currentColor"/><circle cx="8.5" cy="10.5" r="1.5" fill="currentColor"/></svg>
          <svg width="25" height="12" viewBox="0 0 27 13"><rect x="0.5" y=".5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-opacity=".5" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill="currentColor"/><rect x="24.5" y="4" width="1.6" height="5" rx=".8" fill="currentColor" opacity=".5"/></svg>
        </span>
      </div>

      <div class="acc-top">
        <span class="lab">Boarding pass</span>
        <button class="x" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
      </div>

      <div class="acc-wrap">
        <div class="acc-card">
          <div class="acc-band">
            <span class="acc-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 16l8.5-2.5L8 5l2-.5 5.5 7.5 5-1.4a1.6 1.6 0 0 1 .8 3L4 19z"/></svg></span>
            <span class="who">
              <span class="nm">LIS → JFK · TP 201</span>
              <span class="mt">Zé Maria · Sat, Aug 29 · boards 13:05</span>
            </span>
          </div>

          <div class="acc-qr">
            <img class="code" src="qr.svg" alt="Boarding pass QR code" />
            <div class="cap">7XQK2M</div>
          </div>

          <div class="acc-meta">
            <div class="c"><div class="k">Gate</div><div class="v">24</div></div>
            <div class="c"><div class="k">Seat</div><div class="v">14A</div></div>
            <div class="c"><div class="k">Zone</div><div class="v">2</div></div>
          </div>
        </div>
      </div>

      <div class="acc-hint">Screen brightness raised · hold steady at the scanner</div>
      <div class="home-bar"></div>
    </div>
  </div>
</div>
</body>
</html>
