<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Travel — Add to wallet · method</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Schibsted+Grotesk:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../foundations/foundations.css" />
<link rel="stylesheet" href="wallet-shell.css" />
<style>
  .bg-chrome { filter: saturate(0.9); }
  .bg-chrome .screen-topbar { background: oklch(0.99 0.003 256 / 0.9); }
</style>
</head>
<body>
<div class="frame">
  <div class="screen">
    <div class="island"></div>
    <div class="statusbar">
      <span>9:41</span>
      <span class="sb-icons">
        <svg width="18" height="12" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx=".7" fill="currentColor"/><rect x="4.8" y="5" width="3.2" height="7" rx=".7" fill="currentColor"/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx=".7" fill="currentColor"/><rect x="14.4" y="0" width="3.2" height="12" rx=".7" fill="currentColor"/></svg>
        <svg width="16" height="12" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill="currentColor"/><path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill="currentColor"/><circle cx="8.5" cy="10.5" r="1.5" fill="currentColor"/></svg>
        <svg width="25" height="12" viewBox="0 0 27 13"><rect x="0.5" y=".5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-opacity=".35" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill="currentColor"/><rect x="24.5" y="4" width="1.6" height="5" rx=".8" fill="currentColor" opacity=".4"/></svg>
      </span>
    </div>

    <!-- dimmed wallet behind the sheet -->
    <div class="viewport bg-chrome">
      <header class="screen-topbar">
        <button class="screen-topbar__back"><svg class="chev-l" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg> Trip</button>
        <span class="ttl">Travel wallet</span>
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span>
      </header>
      <div class="wal-sub">
        <div class="ctx"><b>Lisbon</b> · 4 days · 7 bookings</div>
      </div>
      <div class="daygrp"><span class="n">Day 1</span><span class="d">Wed · Aug 26</span><span class="rule"></span></div>
      <div class="bk-list">
        <div class="bk">
          <span class="bk-ico lodging"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v6"/><path d="M3 18h18M7 10V7a1 1 0 0 1 1-1h3v4"/></svg></span>
          <span class="bk-body"><span class="nm">Casa do Bairro</span><span class="mt">Check-in 15:00 · 3 nights</span></span>
          <span class="bk-end"><span class="pill upcoming">Soon</span></span>
        </div>
      </div>
    </div>

    <div class="sheet-scrim"></div>

    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <span class="sheet-title">Add to wallet</span>
        <button class="sheet-x" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
      </div>
      <p class="sheet-sub">Hand it over any way you have it — I'll read out the details and file it under the right day.</p>

      <div class="method-list">
        <button class="method primary">
          <span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></span>
          <span class="mbody"><span class="mt">Forward a confirmation</span><span class="ms">Paste text, a link, or an email</span></span>
          <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
        </button>
        <button class="method">
          <span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8V6a2 2 0 0 1 2-2h2M16 4h2a2 2 0 0 1 2 2v2M20 16v2a2 2 0 0 1-2 2h-2M8 20H6a2 2 0 0 1-2-2v-2"/><path d="M4 12h16"/></svg></span>
          <span class="mbody"><span class="mt">Scan a pass or ticket</span><span class="ms">QR code or barcode</span></span>
          <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
        </button>
        <button class="method">
          <span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="14" rx="2.5"/><circle cx="12" cy="13" r="3.5"/><path d="M8 6l1.5-2h5L16 6"/></svg></span>
          <span class="mbody"><span class="mt">From a photo</span><span class="ms">Snap or upload a screenshot</span></span>
          <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
        </button>
      </div>

      <div class="fwd-addr">
        <div><div class="k">Or forward email to</div><div class="v">wallet@aitravel.app</div></div>
        <button class="cp" aria-label="Copy address"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg></button>
      </div>
    </div>

    <div class="home-bar"></div>
  </div>
</div>
</body>
</html>
