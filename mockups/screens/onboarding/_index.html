<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Travel — Onboarding · new trip</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  #root { height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="onboarding/design-canvas.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { createRoot } = ReactDOM;

const STUDIO = '#eaecf0';            /* cool studio grey behind each device */
const AW = 540, AH = 1010;           /* artboard frame — room for the device shadow */

function Device({ src, title }) {
  return (
    <iframe
      src={src}
      title={title}
      scrolling="no"
      style={{ width: '100%', height: '100%', border: 0, display: 'block', background: STUDIO }}
    />
  );
}

const FLOWS = [
  {
    id: 'state-a', title: 'State A · returning user, saves here',
    subtitle: 'Lisbon · 23 saved places. The rich case — the AI plans around the user\u2019s own bucket and base.',
    screens: [
      { id: 'a1', label: '01 · Destination',    src: 'onboarding/state-a-screen-01-destination.html' },
      { id: 'a2', label: '02 · Trip shape',     src: 'onboarding/state-a-screen-02-trip-shape.html' },
      { id: 'a3', label: '03 · Base location',  src: 'onboarding/state-a-screen-03-base-location.html' },
      { id: 'a4', label: '04 · Getting around · shared', src: 'onboarding/screen-04-getting-around.html' },
      { id: 'a5', label: '05 · Generating',     src: 'onboarding/state-a-screen-05-generate.html' },
    ],
  },
  {
    id: 'state-b', title: 'State B · no saves for this city',
    subtitle: 'Kyoto · 0 saved here, saves elsewhere. The AI pivots to the user\u2019s taste profile + the city\u2019s best; \u201cCover the bucket\u201d is locked.',
    screens: [
      { id: 'b1', label: '01 · Destination',    src: 'onboarding/state-b-screen-01-destination.html' },
      { id: 'b2', label: '02 · Trip shape',     src: 'onboarding/state-b-screen-02-trip-shape.html' },
      { id: 'b3', label: '03 · Base location',  src: 'onboarding/state-b-screen-03-base-location.html' },
      { id: 'b4', label: '04 · Getting around', src: 'onboarding/state-b-screen-04-getting-around.html' },
      { id: 'b5', label: '05 · Generating',     src: 'onboarding/state-b-screen-05-generate.html' },
    ],
  },
  {
    id: 'state-c', title: 'State C · first trip, nothing saved',
    subtitle: 'Lisbon · 0 saved anywhere. Taste is seeded explicitly (Step 02 becomes \u201cwhat kind of trip\u201d); the plan is built from the city\u2019s best.',
    screens: [
      { id: 'c1', label: '01 · Destination',    src: 'onboarding/state-c-screen-01-destination.html' },
      { id: 'c2', label: '02 · Trip shape',     src: 'onboarding/state-c-screen-02-trip-shape.html' },
      { id: 'c3', label: '03 · Base location',  src: 'onboarding/state-c-screen-03-base-location.html' },
      { id: 'c4', label: '04 · Getting around · shared', src: 'onboarding/screen-04-getting-around.html' },
      { id: 'c5', label: '05 · Generating',     src: 'onboarding/state-c-screen-05-generate.html' },
    ],
  },
];

function App() {
  return (
    <DesignCanvas>
      {FLOWS.map((flow) => (
        <DCSection key={flow.id} id={flow.id} title={flow.title} subtitle={flow.subtitle}>
          {flow.screens.map((s) => (
            <DCArtboard key={s.id} id={s.id} label={s.label} width={AW} height={AH} style={{ background: STUDIO }}>
              <Device src={s.src} title={s.label} />
            </DCArtboard>
          ))}
        </DCSection>
      ))}
    </DesignCanvas>
  );
}

createRoot(document.getElementById('root')).render(<App />);
</script>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#eaecf0"/>
    <rect x="34" y="20" width="32" height="60" rx="8" fill="#0c0d0f"/>
    <rect x="37" y="23" width="26" height="54" rx="6" fill="#ffffff"/>
    <circle cx="50" cy="68" r="3.5" fill="#0a84ff"/>
  </svg>
</template>
</body>
</html>
